<main class="app-shell">
  <header class="brand">
    <svg class="brand-icon" viewBox="0 0 36 36" aria-hidden="true">
        <!-- Icono de Archivo / Documento -->
        <path d="M10 4H21L28 11V30C28 31.1 27.1 32 26 32H10C8.9 32 8 31.1 8 30V6C8 4.9 8.9 4 10 4Z" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
        <path d="M21 4V11H28" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
        
        <!-- Icono de Tijera en el centro -->
        <circle cx="15" cy="20" r="2.5" fill="none" stroke="currentColor" stroke-width="2"/>
        <circle cx="15" cy="26" r="2.5" fill="none" stroke="currentColor" stroke-width="2"/>
        <path d="M17.2 21.2L24 25M17.2 24.8L24 21" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
    </svg>
    <div>
      <h1 class="brand-title">Division de PDFs</h1>
      <p class="brand-subtitle">Cargue un archivo PDF y seleccione las paginas a dividir.</p>
    </div>
  </header>

  <section class="main-panel upload-panel">
    <label
      class="drop-zone"
      [class.drop-zone--active]="isDragging()"
      (dragover)="onDragOver($event)"
      (dragleave)="onDragLeave()"
      (drop)="onDrop($event)"
    >
      <input type="file" accept="application/pdf" (change)="onFileSelected($event)" />
      <svg class="upload-icon" viewBox="0 0 32 32" aria-hidden="true">
        <path d="M16 21V7m0 0-5 5m5-5 5 5" fill="none" stroke="currentColor" stroke-width="2" />
        <path d="M7 21v5h18v-5" fill="none" stroke="currentColor" stroke-width="2" />
      </svg>
      <strong>{{ isLoading() ? 'Leyendo PDF...' : 'Arrastre el archivo aqui o haga clic para seleccionarlo.' }}</strong>
    </label>
    @if (error()) {
      <p class="error">{{ error() }}</p>
    }
  </section>
</main>
